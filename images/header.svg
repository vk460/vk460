<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 185" width="100%">
  <defs>
    <!-- Left Accent Bar Gradient -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="50%" stop-color="#FF2D78"/>
      <stop offset="100%" stop-color="#BF5AF2"/>
    </linearGradient>

    <!-- Underline Gradient -->
    <linearGradient id="underline1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#BF5AF2"/>
    </linearGradient>
    
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@900&amp;family=Courier+Prime:wght@700&amp;display=swap');
      
      .glitch-text {
        font-family: 'Outfit', Georgia, serif;
        font-size: 54px;
        font-weight: 900;
        letter-spacing: -1px;
      }
      
      .subtitle-text {
        font-family: 'Courier Prime', 'Courier New', monospace;
        font-size: 13px;
        letter-spacing: 2px;
        fill: #FF8C42;
      }

      /* Cyberpunk Glitch & Flicker Animation */
      @keyframes glitch {
        0% {
          transform: translate(0);
        }
        20% {
          transform: translate(-1.5px, 1.5px);
        }
        40% {
          transform: translate(-0.8px, -0.8px);
        }
        60% {
          transform: translate(1.5px, -1.5px);
        }
        80% {
          transform: translate(0.8px, 1.5px);
        }
        100% {
          transform: translate(0);
        }
      }

      @keyframes flicker {
        0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
          opacity: 1;
        }
        20%, 24%, 55% {
          opacity: 0.8;
        }
      }

      .animated-glitch {
        animation: glitch 2s infinite steps(2);
      }

      .animated-flicker {
        animation: flicker 6s infinite;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="640" height="185" rx="8" fill="#0a0a0a" />

  <!-- Accent bar left -->
  <rect x="0" y="0" width="4" height="185" fill="url(#g1)" />

  <!-- Scanlines top and bottom -->
  <rect x="0" y="0" width="640" height="2" fill="#FF6B35" opacity="0.5" />
  <rect x="0" y="183" width="640" height="2" fill="#BF5AF2" opacity="0.5" />

  <!-- Main name with chromatic aberration split shadow -->
  <!-- Cyan Shadow -->
  <text x="34" y="112" class="glitch-text" fill="#00f0ff" opacity="0.35">Veena Kulkarni</text>
  
  <!-- Pink Shadow -->
  <text x="37" y="114" class="glitch-text" fill="#FF2D78" opacity="0.45">Veena Kulkarni</text>
  
  <!-- Main White Text -->
  <text x="35" y="113" class="glitch-text animated-glitch" fill="#ffffff">Veena Kulkarni</text>

  <!-- Underline gradient -->
  <rect x="35" y="122" width="420" height="3" rx="1" fill="url(#underline1)" />

  <!-- Subtitle -->
  <text x="37" y="154" class="subtitle-text animated-flicker">AI DEVELOPER  •  GENAI BUILDER  •  9.5 CGPA</text>

  <!-- Corner Brackets -->
  <path d="M605 15 L625 15 L625 35" fill="none" stroke="#BF5AF2" stroke-width="1.5" />
  <path d="M605 170 L625 170 L625 150" fill="none" stroke="#FF6B35" stroke-width="1.5" />
</svg>
